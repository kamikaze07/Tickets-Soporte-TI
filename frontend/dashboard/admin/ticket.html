<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Ticket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <base href="/ticketssoporteti/frontend/dashboard/admin/">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="css/dashboard.css">
  <script src="js/ticket.js" defer></script>
</head>
<body>

<header class="header">
  <button id="btnMenu" class="menu-btn">☰</button>
  <span class="header-title">Detalle del Ticket</span>
  <span class="header-user">SUPER USUARIO</span>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <nav id="sidebarNav" class="sidebar">
    <ul class="sidebar-menu">
      <li onclick="location.href='../admin/index.html'">
      <span class="material-icons">dashboard</span>
      Dashboard
    </li>

    <li class="active" onclick="location.href='tickets.html'">
      <span class="material-icons">confirmation_number</span>
      Tickets
    </li>

    <li onclick="location.href='inventario/index.html'">
      <span class="material-icons">inventory_2</span>
      Inventario TI
    </li>

    <li onclick="location.href='mantenimientos/index.html'">
      <span class="material-icons">build</span>
      Mantenimientos
    </li>

    <li id="btnLogout" class="logout">
      <span class="material-icons">logout</span>
      Cerrar sesión
    </li>

    </ul>
  </nav>

  <!-- CONTENT -->
  <main class="content">

    <!-- HEADER TICKET -->
    <section class="ticket-header">
      <div>
        <h1 id="ticketTitle">Ticket #</h1>
        <div id="ticketMeta" class="ticket-meta"></div>
      </div>

      <div class="ticket-actions">
        <select id="estadoTicket"></select>
        <button class="btn danger" id="btnCerrar">Cerrar ticket</button>
      </div>
    </section>

    <!-- INFO -->
    <section class="ticket-info">
      <div><strong>Usuario:</strong> <span id="ticketUsuario"></span></div>
      <div><strong>Prioridad:</strong> <span id="ticketPrioridad"></span></div>
      <div><strong>Fecha:</strong> <span id="ticketFecha"></span></div>
      <div><strong>Categoría:</strong> <span id="ticketCategoria"></span></div>
    </section>

    <!-- DESCRIPCIÓN DEL TICKET -->
    <section class="ticket-description">
      <h3>Descripción</h3>
      <p id="ticketDescripcion" class="ticket-descripcion"></p>
    </section>

    <!-- CHAT -->
    <section class="chat">
      <div id="chatMessages" class="chat-messages"></div>

    <div class="chat-input">
    <button type="button" id="btnFileAdmin" class="btn-clip">📎</button>

    <input
      type="file"
      id="fileInputAdmin"
      accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
      hidden
    />


      <textarea
        id="respuesta"
        placeholder="Escribe una respuesta para el usuario…"
      ></textarea>

      <button class="btn" id="btnResponder">Enviar</button>
    </div>

    </section>
    <div id="typingIndicator" class="typing-indicator hidden">
  El usuario está escribiendo…
  <div id="uploadProgressContainer" class="upload-progress hidden">
  <div id="uploadProgressBar" class="upload-progress-bar"></div>
</div>

</div>

  </main>
</div>

<div class="sidebar-overlay"></div>

<div id="imageModal" class="image-modal hidden">
  <span id="closeImageModal">&times;</span>
  <img id="modalImage">
</div>


</body>
</html>
